<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>VOCA Audio Quiz v16</title>
<style>
  :root{
    --bg:#f4f7fb;--card:#fff;--ink:#0f172a;--muted:#64748b;--line:#e2e8f0;
    --primary:#2563eb;--primary2:#1d4ed8;--soft:#eff6ff;--good:#16a34a;--bad:#dc2626;
    --shadow:0 24px 70px rgba(15,23,42,.10);--radius:28px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{margin:0;font-family:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",Arial,sans-serif;background:radial-gradient(circle at 10% 0%,#dbeafe 0,#f8fafc 32%,#f8fafc 100%);color:var(--ink)}
  button,input,select,textarea{font:inherit}
  button{touch-action:manipulation}
  .app{width:min(1020px,100%);margin:0 auto;padding:18px 16px 34px}
  .top{position:sticky;top:0;z-index:15;margin:0 -16px 16px;padding:12px 16px;background:rgba(248,250,252,.86);backdrop-filter:blur(18px);border-bottom:1px solid rgba(226,232,240,.75)}
  .topRow{display:flex;align-items:center;justify-content:space-between;gap:12px;width:min(1020px,100%);margin:0 auto}
  .brand{display:flex;align-items:center;gap:10px;min-width:0}
  .logo{width:40px;height:40px;border-radius:16px;background:linear-gradient(135deg,#2563eb,#7c3aed);box-shadow:0 12px 30px rgba(37,99,235,.22)}
  .title{font-size:20px;font-weight:950;letter-spacing:-.04em;white-space:nowrap}
  .ready{font-size:12px;font-weight:900;color:#fff;background:#0f172a;border-radius:999px;padding:8px 11px;white-space:nowrap}
  .gear{width:44px;height:44px;border:0;border-radius:17px;background:#fff;color:#0f172a;box-shadow:0 8px 24px rgba(15,23,42,.08);font-size:20px;cursor:pointer}
  .nav{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:14px 0 0}
  .nav button{border:0;border-radius:17px;background:#e2e8f0;color:#475569;padding:12px 10px;font-weight:950;cursor:pointer}
  .nav button.on{background:#fff;color:#0f172a;box-shadow:0 12px 28px rgba(15,23,42,.08)}
  .scene{display:none;animation:fadeIn .22s ease both}
  .scene.on{display:block}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .card{background:rgba(255,255,255,.92);border:1px solid rgba(226,232,240,.9);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px}
  .cardTitle{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:0 0 14px}
  .cardTitle h2{margin:0;font-size:17px;letter-spacing:-.03em}
  label{display:block;color:#334155;font-size:13px;font-weight:900;margin:13px 0 7px}
  .filebox{display:block;border:1.5px dashed #93c5fd;background:linear-gradient(135deg,#eff6ff,#fff);border-radius:24px;padding:24px 18px;text-align:center;cursor:pointer;transition:.16s}
  .filebox:active{transform:scale(.99)}
  .filebox b{display:block;font-size:18px;margin-bottom:6px;letter-spacing:-.03em}
  .filebox span{font-size:12px;color:var(--muted);font-weight:800}
  input[type=file]{display:none}
  input[type=number],input[type=text],select,textarea{width:100%;border:1px solid var(--line);border-radius:18px;padding:13px 14px;background:#fff;outline:none;color:#0f172a;font-weight:800}
  textarea{min-height:146px;resize:vertical;line-height:1.45;font-weight:650}
  input:focus,select:focus,textarea:focus{border-color:#60a5fa;box-shadow:0 0 0 4px #dbeafe}
  .row{display:grid;grid-template-columns:1fr 1.2fr;gap:10px}
  .btn{border:0;border-radius:18px;padding:13px 16px;font-weight:950;cursor:pointer;background:#e2e8f0;color:#0f172a;display:inline-flex;align-items:center;justify-content:center;gap:7px;min-height:48px}
  .btn.primary{background:var(--primary);color:#fff;box-shadow:0 12px 26px rgba(37,99,235,.24)}
  .btn.good{background:#dcfce7;color:#166534}.btn.bad{background:#fee2e2;color:#991b1b}.btn.full{width:100%}
  .btn:active{transform:scale(.985)}
  .bars{display:grid;gap:10px;margin-top:16px}
  .barrow{display:grid;grid-template-columns:76px 1fr 42px;gap:9px;align-items:center;font-size:12px;color:#475569;font-weight:900}
  .bar{height:10px;border-radius:999px;background:#e2e8f0;overflow:hidden}
  .bar i{display:block;height:100%;width:0%;background:linear-gradient(90deg,#60a5fa,#2563eb);border-radius:999px;transition:width .12s linear}
  .status{font-size:13px;color:#475569;font-weight:900;margin-top:10px;min-height:20px}
  .stage{border-radius:32px;background:linear-gradient(135deg,#eff6ff,#f5f3ff);border:1px solid #dbeafe;padding:28px 18px;text-align:center;min-height:360px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
  .counter{font-size:14px;color:#475569;font-weight:950}
  .word{font-size:44px;line-height:1.05;font-weight:950;letter-spacing:-.05em;word-break:keep-all}
  .meaning{font-size:17px;color:#334155;font-weight:850;min-height:25px}
  .controls{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:16px}
  .quizWrap{display:grid;gap:14px}
  .quizMain{min-height:295px}
  .answerBox{background:#fff;border:1px solid var(--line);border-radius:28px;padding:16px;box-shadow:0 16px 40px rgba(15,23,42,.06)}
  .answerGrid{display:grid;grid-template-columns:1fr;gap:10px}
  .answerGrid.two{grid-template-columns:1fr 1fr}
  .answer{font-size:20px;text-align:center;padding:17px 15px!important;border-radius:20px!important}
  .score{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  .score div{background:#fff;border:1px solid var(--line);border-radius:20px;padding:13px;text-align:center;font-weight:950}
  .score span{display:block;color:var(--muted);font-size:12px;margin-bottom:4px}
  .list{margin-top:14px;display:grid;gap:8px;max-height:250px;overflow:auto}
  .item,.historyItem{width:100%;border:1px solid #e2e8f0;background:#fff;border-radius:18px;padding:11px 12px;display:grid;grid-template-columns:72px 1fr auto 28px;gap:10px;align-items:center;text-align:left;font-size:13px;font-weight:850;color:#0f172a}
  .item{grid-template-columns:54px 1fr auto}
  .historyItem b,.item b{color:#2563eb}
  .historyItem small,.item small{color:var(--muted);font-weight:800;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .historyItem i{font-style:normal;text-align:center;color:#2563eb}
  .ok{color:var(--good)!important}.no{color:var(--bad)!important}
  .hidden{display:none!important}
  .miniGrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  input[type=range]{width:100%;accent-color:var(--primary)}
  .switch{display:flex;gap:9px;align-items:center;background:#f8fafc;border:1px solid var(--line);padding:11px 12px;border-radius:18px;font-size:13px;font-weight:900;color:#334155}
  .switch input{width:18px;height:18px;accent-color:var(--primary)}
  .modalOverlay{position:fixed;inset:0;z-index:50;background:rgba(15,23,42,.34);display:flex;align-items:center;justify-content:center;padding:18px;opacity:0;visibility:hidden;pointer-events:none;transition:opacity .24s ease,visibility .24s ease}
  .settingsOpen .modalOverlay{opacity:1;visibility:visible;pointer-events:auto}
  .modal{width:min(720px,100%);max-height:min(760px,92vh);overflow:auto;background:rgba(255,255,255,.96);border:1px solid rgba(226,232,240,.95);border-radius:32px;box-shadow:0 32px 100px rgba(15,23,42,.25);padding:18px;opacity:0;transform:translateY(14px) scale(.97);transition:opacity .24s ease,transform .24s ease}
  .settingsOpen .modal{opacity:1;transform:translateY(0) scale(1)}
  .modalHead{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:8px}
  .modalHead h2{font-size:18px;margin:0;letter-spacing:-.03em}
  .iconBtn{width:42px;height:42px;border:0;border-radius:16px;background:#f1f5f9;font-size:20px;font-weight:950;cursor:pointer}
  .ico{width:21px;height:21px;display:inline-block;vertical-align:-4px;stroke:currentColor;fill:none;stroke-width:2.35;stroke-linecap:round;stroke-linejoin:round}
  .gear .ico,.iconOnly .ico{width:22px;height:22px;vertical-align:-5px}

  .btn:disabled{opacity:.45;cursor:not-allowed;transform:none!important}
  .quizTools{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
  .resultRow{grid-template-columns:74px 1fr 1.4fr 44px 72px}
  .resultRow .playMini{width:38px;height:38px;min-height:38px;border-radius:14px;padding:0}
  .wrongMark{display:flex!important;align-items:center;justify-content:center;gap:6px;margin:0!important;color:#334155;font-size:12px;font-weight:950}
  .wrongMark input{width:17px;height:17px;accent-color:var(--bad)}
  .quiet{color:var(--muted);font-size:13px;font-weight:900;text-align:center;padding:12px}

  .iconOnly{width:52px;min-width:52px;padding:0;font-size:20px;border-radius:19px}
  .softTools{gap:8px}.softTools .btn{min-height:46px}
  .flashcard{width:min(520px,100%);height:230px;perspective:1100px;cursor:pointer;margin:2px auto}
  .flashInner{position:relative;width:100%;height:100%;transform-style:preserve-3d;transition:transform .55s cubic-bezier(.2,.8,.2,1)}
  .flashcard.flipped .flashInner{transform:rotateY(180deg)}
  .flashFace{position:absolute;inset:0;border-radius:30px;background:rgba(255,255,255,.94);border:1px solid rgba(219,234,254,.95);box-shadow:0 22px 54px rgba(15,23,42,.10);display:flex;align-items:center;justify-content:center;flex-direction:column;padding:24px;backface-visibility:hidden;text-align:center}
  .flashBack{transform:rotateY(180deg);background:linear-gradient(135deg,#ffffff,#f8fbff)}
  .flashHint{font-size:12px;color:var(--muted);font-weight:900;margin-top:10px}
  .flashMeaning{font-size:24px;line-height:1.55;font-weight:950;color:#0f172a;white-space:pre-line;word-break:keep-all}
  .flashWord{font-size:44px;line-height:1.08;font-weight:950;letter-spacing:-.045em;word-break:break-word}
  .modal{overflow:hidden;display:flex;flex-direction:column}
  .settingsBody{overflow-y:auto;overflow-x:hidden;overscroll-behavior:contain;padding:0 6px 4px 0;margin-right:-6px}
  .settingsBody::-webkit-scrollbar,.list::-webkit-scrollbar{width:9px}.settingsBody::-webkit-scrollbar-thumb,.list::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:999px;border:2px solid #fff}.settingsBody::-webkit-scrollbar-track,.list::-webkit-scrollbar-track{background:transparent}
  .settingsGroup{background:#f8fafc;border:1px solid var(--line);border-radius:22px;padding:12px;margin:10px 0}
  .settingsGroup label:first-child{margin-top:0}
  .pillRow{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .smallNote{font-size:12px;color:var(--muted);font-weight:850}


  .settingsFooter{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding-top:12px;border-top:1px solid var(--line);margin-top:10px}
  .settingsFooter .btn{width:100%;min-height:50px}
  .wordApplyHidden{display:none!important}

  .skeletonLayer{display:none!important}
  @keyframes skeletonWave{100%{transform:translateX(100%)}}
  @keyframes mainSkeletonWave{0%{background-position:180% 0}100%{background-position:-180% 0}}
  body.mainSkeleton .scene.on .card{position:relative;overflow:hidden}
  body.mainSkeleton .scene.on .card::after{content:"";position:absolute;inset:0;pointer-events:none;background:linear-gradient(90deg,transparent,rgba(255,255,255,.64),transparent);transform:translateX(-100%);animation:skeletonWave 1.18s infinite;z-index:4}
  body.mainSkeleton .scene.on .card .filebox,
  body.mainSkeleton .scene.on .card input,
  body.mainSkeleton .scene.on .card select,
  body.mainSkeleton .scene.on .card textarea,
  body.mainSkeleton .scene.on .card .btn,
  body.mainSkeleton .scene.on .card .stage,
  body.mainSkeleton .scene.on .card .answerBox,
  body.mainSkeleton .scene.on .card .score div,
  body.mainSkeleton .scene.on .card .settingsGroup{background-image:linear-gradient(90deg,#eef2f7 0%,#f8fafc 42%,#e2e8f0 78%);background-size:220% 100%;animation:mainSkeletonWave 1.28s linear infinite;border-color:#e2e8f0!important;color:transparent!important;text-shadow:none!important}
  body.mainSkeleton .scene.on .card input::placeholder,
  body.mainSkeleton .scene.on .card textarea::placeholder{color:transparent!important}
  body.mainSkeleton .scene.on .card .bars,
  body.mainSkeleton .scene.on .card .status,
  body.mainSkeleton .scene.on .card .cardTitle{position:relative;z-index:5;color:#475569!important}
  body.mainSkeleton .scene.on .card .bar i{animation:none}
  .skeletonText{font-size:13px;color:#475569;font-weight:950;margin-top:8px}

  @media(max-width:760px){
    .app{padding:12px 12px 26px}.top{margin:0 -12px 12px;padding:10px 12px}.title{font-size:18px}.logo{width:36px;height:36px;border-radius:14px}.ready{display:none}
    .nav{gap:6px}.nav button{padding:11px 8px;border-radius:15px;font-size:14px}
    .card{padding:14px;border-radius:24px}.stage{min-height:300px;border-radius:26px;padding:24px 12px}.word{font-size:36px}
    .row,.miniGrid,.answerGrid.two{grid-template-columns:1fr}
    .controls{display:grid;grid-template-columns:1fr 1fr;width:100%}.controls .btn{width:100%}
    .quizMain .controls{grid-template-columns:1fr}
    .answerBox{position:sticky;bottom:10px;z-index:5;border-radius:24px}
    .score{grid-template-columns:repeat(3,1fr);gap:7px}.score div{padding:10px 8px;border-radius:16px}
    .historyItem{grid-template-columns:64px 1fr 24px;font-size:12px}.historyItem small{grid-column:2/3}.historyItem i{grid-row:1/3;grid-column:3/4}
    .resultRow{grid-template-columns:60px 1fr 38px;gap:7px}.resultRow small{grid-column:2/3}.resultRow .playMini{grid-column:3/4;grid-row:1/3}.resultRow .wrongMark{grid-column:1/4;justify-content:flex-start}
    .barrow{grid-template-columns:66px 1fr 38px}
    .flashcard{height:210px}.flashWord{font-size:34px}.flashMeaning{font-size:21px}
  }
</style>
</head>
<body>
  <div class="top">
    <div class="topRow">
      <div class="brand"><div class="logo"></div><div class="title">VOCA Audio Quiz</div></div>
      <div class="ready" id="readyPill">대기 중</div>
      <button class="gear" id="openSettings" type="button" aria-label="설정"></button>
    </div>
    <div class="nav">
      <button class="on" type="button" data-scene="setup">준비</button>
      <button type="button" data-scene="listen">듣기</button>
      <button type="button" data-scene="quiz">시험</button>
    </div>
  </div>

  <div class="app">
    <section id="setup" class="scene on">
      <div class="card">
        <div class="cardTitle"><h2>파일</h2></div>
        <label class="filebox" for="zipInput"><b id="fileName">ZIP 업로드</b><span>MP3 / ZIP</span></label>
        <input id="zipInput" type="file" accept=".zip,.mp3,audio/mpeg" multiple />
        <div class="row">
          <div><label>회차</label><input id="dayInput" type="number" min="1" max="999" value="53" /></div>
          <div><label>구간 기준</label><select id="cutPreset"><option value="normal" selected>기본</option><option value="wide">넓게</option><option value="tight">촘촘하게</option></select></div>
        </div>
        <button class="btn primary full" id="analyzeBtn" style="margin-top:14px">분석 시작</button>
        <div class="status" id="statusText"></div>
        <div class="bars">
          <div class="barrow"><span>ZIP</span><div class="bar"><i id="barZip"></i></div><em id="numZip">0%</em></div>
          <div class="barrow"><span>디코드</span><div class="bar"><i id="barDecode"></i></div><em id="numDecode">0%</em></div>
          <div class="barrow"><span>단어만</span><div class="bar"><i id="barTwo"></i></div><em id="numTwo">0%</em></div>
          <div class="barrow"><span>단어+뜻</span><div class="bar"><i id="barPlus"></i></div><em id="numPlus">0%</em></div>
          <div class="barrow"><span>인식</span><div class="bar"><i id="barAsr"></i></div><em id="numAsr">0%</em></div>
          <div class="barrow"><span>전체</span><div class="bar"><i id="barAll"></i></div><em id="numAll">0%</em></div>
        </div>
      </div>
    </section>

    <section id="listen" class="scene">
      <div class="card">
        <div class="stage">
          <div class="counter" id="listenCount">0 / 0</div>
          <div class="flashcard" id="flashcard" title="카드를 클릭하면 뒤집힙니다">
            <div class="flashInner">
              <div class="flashFace flashFront">
                <div class="flashWord" id="listenTitle">업로드</div>
                <div class="flashHint">클릭하면 뜻 보기</div>
              </div>
              <div class="flashFace flashBack">
                <div class="flashMeaning" id="listenSub"></div>
                <div class="flashHint">클릭하면 단어 보기</div>
              </div>
            </div>
          </div>
          <div class="controls softTools">
            <button class="btn primary iconOnly" id="playOne" title="재생" aria-label="재생"></button>
            <button class="btn good" id="playAll" title="랜덤 전체" aria-label="랜덤 전체"></button>
            <button class="btn bad iconOnly" id="stopListen" title="정지" aria-label="정지"></button>
          </div>
        </div>
        <div class="controls">
          <button class="btn iconOnly" id="prevBtn" title="이전">‹</button>
          <button class="btn iconOnly" id="shuffleBtn" title="랜덤" aria-label="랜덤"></button>
          <button class="btn iconOnly" id="nextBtn" title="다음">›</button>
        </div>
      </div>
    </section>

    <section id="quiz" class="scene">
      <div class="quizWrap">
        <div class="card quizMain">
          <div class="stage quizMain">
            <div class="counter" id="quizCount">0 / 0</div>
            <div class="word" id="quizTitle">시험</div>
            <div class="meaning" id="quizFeedback"></div>
            <div class="controls">
              <button class="btn primary iconOnly" id="quizPlay" title="다시 듣기" aria-label="다시 듣기"></button>
              <button class="btn" id="startQuiz">시작</button>
              <button class="btn" id="pauseQuiz" title="일시정지"></button>
              <button class="btn bad" id="stopQuiz">시험 종료</button>
            </div>
          </div>
        </div>
        <div class="answerBox" id="answerBox">
          <div class="answerGrid" id="answerGrid">
            <input class="answer" id="answerInput" type="text" autocomplete="off" placeholder="단어 입력" />
            <input class="answer hidden" id="meaningInput" type="text" autocomplete="off" placeholder="뜻 입력" />
          </div>
          <div class="controls">
            <button class="btn good" id="submitAnswer">확인</button>
            <button class="btn" id="skipAnswer">넘기기</button>
          </div>
        </div>
        <div class="score">
          <div><span>정답</span><b id="scoreOk">0</b></div>
          <div><span>오답</span><b id="scoreNo">0</b></div>
          <div><span>남은 수</span><b id="scoreLeft">0</b></div>
        </div>
        <div class="quizTools">
          <button class="btn good" id="finalSubmit">최종 제출</button>
          <button class="btn" id="retryWrong">틀린 문제 다시</button>
        </div>
        <div class="list" id="resultList"></div>
      </div>
    </section>
  </div>

  <div class="skeletonLayer" id="loadingSkeleton" aria-hidden="true">
    <div class="skeletonBox">
      <div class="skeletonHead"><div class="skeletonCircle"></div><div style="flex:1"><div class="skeletonLine small"></div><div class="skeletonText" id="skeletonTitle">불러오는 중</div></div></div>
      <div class="skeletonLine big"></div>
      <div class="skeletonLine mid"></div>
      <div class="skeletonLine small"></div>
      <div class="skeletonLine full"></div>
      <div class="skeletonText" id="skeletonSub">잠시만 기다려 주세요.</div>
    </div>
  </div>

  <div class="modalOverlay" id="settingsOverlay">
    <section class="modal" role="dialog" aria-modal="true">
      <div class="modalHead"><h2>설정</h2><button class="iconBtn" id="closeSettings" type="button" aria-label="닫기"></button></div>
      <div class="settingsBody">
      <div class="settingsGroup">
      <div class="miniGrid">
        <div><label>듣기 오디오</label><select id="studyAudio"><option value="meaning" selected>단어+뜻</option><option value="wordOnly">단어만</option><option value="meaningOnly">뜻만</option></select></div>
        <div><label>시험 오디오</label><select id="testAudio"><option value="wordOnly" selected>단어만</option><option value="meaningOnly">뜻만</option><option value="meaning">단어+뜻</option></select></div>
      </div>
      </div>
      <div class="settingsGroup">
      <div class="switch"><input id="asrEnabled" type="checkbox" checked><span>음성에서 단어와 뜻 글자 추출</span></div>
      </div>
      <div class="settingsGroup">
      <div class="miniGrid">
        <div><label>시험 방식</label><select id="quizMode"><option value="typing" selected>직접 쓰기</option><option value="audioOnly">오디오만</option></select></div>
        <div><label>입력 정답</label><select id="answerMode"><option value="word" selected>단어만</option><option value="meaning">뜻만</option><option value="both">단어+뜻</option><option value="either">단어 또는 뜻</option></select></div>
      </div>
      </div>
      <div class="settingsGroup">
      <div class="miniGrid">

      audioRoles.meaningOnly = 'meaningOnly';
    }
  }
  function ensureDerivedBuffers(){
    if(audioRoles.meaningOnly === 'meaningOnly' && !audioBuffers.meaningOnly){
      const mk = audioRoles.meaning;
      if(mk && audioBuffers[mk]) audioBuffers.meaningOnly = audioBuffers[mk];
    }
  }
  function resolveAudioKind(choice){
    if(choice === 'wordOnly') return audioRoles.wordOnly || 'wordOnly' || 'two';
    if(choice === 'meaningOnly') return audioRoles.meaningOnly || 'meaningOnly' || audioRoles.meaning || audioRoles.wordOnly;
    if(choice === 'meaning') return audioRoles.meaning || audioRoles.wordOnly || 'meaning' || 'plus';
    return choice || audioRoles.wordOnly || 'wordOnly';
  }
  function getPromptMode(idx){
    const it = items[idx] || {};
    if(els.answerMode.value !== 'either') return els.answerMode.value;
    if(it.word && it.meaning) return Math.random() < 0.5 ? 'word' : 'meaning';
    if(it.meaning) return 'meaning';
    return 'word';
  }
  function getQuizAudioKind(){
    if(quiz && els.answerMode.value === 'either'){
      return resolveAudioKind(quiz.currentPromptMode === 'meaning' ? 'meaningOnly' : 'wordOnly');
    }
    return resolveAudioKind(els.testAudio ? els.testAudio.value : 'wordOnly');
  }


  function ensureWordSlot(i){
    while(words.length <= i) words.push({word:'', meaning:''});
    if(!words[i]) words[i] = {word:'', meaning:''};
    if(typeof words[i] === 'string') words[i] = {word:words[i], meaning:''};
    return words[i];
  }
  function stripAsrJunk(s){
    return String(s||'')
      .replace(/<\|[^>]+\|>/g,' ')
      .replace(/[“”]/g,'"').replace(/[‘’]/g,"'")
      .replace(/\s+/g,' ')
      .trim();
  }
  function simplifyRepeatedText(text){
    const t = stripAsrJunk(text);
    const parts = t.split(/\s+/).filter(Boolean);
    if(parts.length >= 2){
      const half = parts.length / 2;
      if(Number.isInteger(half)){
        const a = parts.slice(0, half).join(' ').toLowerCase();
        const b = parts.slice(half).join(' ').toLowerCase();
        if(a === b) return parts.slice(0, half).join(' ');
      }
      if(parts[0].toLowerCase() === parts[1].toLowerCase()) return parts[0];
    }
    const m = t.match(/[A-Za-z][A-Za-z'’\-.]*(?:\s+[A-Za-z][A-Za-z'’\-.]*)?/);
    return m ? m[0].replace(/[’]/g,"'").trim() : t;
  }
  function cleanRecognizedMeaning(text){
    return stripAsrJunk(text)
      .replace(/^[\s,，.。;；:：ㆍ·/|!?？!~\-]+|[\s,，.。;；:：ㆍ·/|!?？!~\-]+$/g,'')
      .replace(/\s*[,，;；/ㆍ·|]\s*/g,'\n')
      .replace(/\n{2,}/g,'\n')
      .trim();
  }
  function shouldFillWord(i, field){
    const v = words[i] && words[i][field];
    return !String(v||'').trim();
  }
  async function recognizeContents(){
    if(!els.asrEnabled || !els.asrEnabled.checked){ setProgress('asr',1,'음성 인식 건너뜀'); return; }
    if(!items.length){ setProgress('asr',1); return; }
    showSkeleton('음성 내용 인식 중','단어와 뜻을 글자로 추출하고 있습니다.');
    setStatus('음성 내용 인식 중');
    try{
      const wk = audioRoles.wordOnly;
      const mk = audioRoles.meaningOnly;
      let did = false;
      if(wk && audioBuffers[wk] && segments[wk] && segments[wk].length){
        did = true;
        const pcm = audioBuffers[wk].getChannelData(0).slice();
        const segs = segments[wk].slice(0, items.length);
        const out = await callAsr({pcm, sampleRate:audioBuffers[wk].sampleRate, segments:segs, language:'en'}, [pcm.buffer], (i,text)=>{
          const w = simplifyRepeatedText(text);
          if(w && shouldFillWord(i,'word')){ ensureWordSlot(i).word = w; if(items[i]) items[i].word = w; updateListen(); }
        });
        out.forEach((text,i)=>{ const w=simplifyRepeatedText(text); if(w && shouldFillWord(i,'word')) ensureWordSlot(i).word=w; });
      }
      if(mk && audioBuffers[mk] && segments[mk] && segments[mk].length){
        did = true;
        const sourceParts = segments.meaningParts && segments.meaningParts.length ? segments.meaningParts : segments[mk].map(s=>[s]);
        const flat = [], map = [];
        for(let i=0;i<Math.min(items.length, sourceParts.length);i++){
          const arr = Array.isArray(sourceParts[i]) && sourceParts[i].length ? sourceParts[i] : [segments[mk][i]];
          for(const seg of arr){ if(seg){ flat.push(seg); map.push(i); } }
        }
        if(flat.length){
          const pcm = audioBuffers[mk].getChannelData(0).slice();
          const bucket = Array.from({length:items.length},()=>[]);
          const out = await callAsr({pcm, sampleRate:audioBuffers[mk].sampleRate, segments:flat, language:'ko'}, [pcm.buffer], (j,text)=>{
            const i = map[j];
            const m = cleanRecognizedMeaning(text);
            if(m){ bucket[i].push(m); if(shouldFillWord(i,'meaning')){ ensureWordSlot(i).meaning = bucket[i].join('\n'); if(items[i]) items[i].meaning = words[i].meaning; updateListen(); } }
          });
          out.forEach((text,j)=>{ const i=map[j]; const m=cleanRecognizedMeaning(text); if(m) bucket[i].push(m); });
          for(let i=0;i<bucket.length;i++){
            const meaning = bucket[i].filter(Boolean).join('\n').replace(/\n{2,}/g,'\n').trim();
            if(meaning && shouldFillWord(i,'meaning')) ensureWordSlot(i).meaning = meaning;
          }
        }
      }
      if(!did) setProgress('asr',1,'인식할 오디오 없음');
      if(words.length) els.wordText.value = words.map(x=>x.word+(x.meaning?'\t'+x.meaning:'')).join('\n');
      setProgress('asr',1,'음성 인식 완료');
      setStatus('음성 내용 인식 완료');
    }catch(e){
      console.warn(e);
      setProgress('asr',1,'음성 인식 실패');
      setStatus('음성 인식 실패: '+String(e.message||e));
    }finally{
      hideSkeleton();
    }
  }

  function buildItems(){
    updateAudioRoles();
    mergeWordOnlyPairs();
    updateAudioRoles();
    deriveMeaningOnlySegments();
    updateAudioRoles();
    ensureDerivedBuffers();
    const wk = audioRoles.wordOnly;
    const mk = audioRoles.meaning;
    const counts = [];
    if(segments[wk]) counts.push(segments[wk].length);
    if(segments[mk] && mk !== wk) counts.push(segments[mk].length);
    if(!counts.length){
      for(const k of decodedKinds()) counts.push(segments[k].length);
    }
    let count = counts.length ? Math.min(...counts) : 0;
    if(count===Infinity) count=0;
    items = Array.from({length:count},(_,i)=>({
      idx:i,
      two:segments[wk] && segments[wk][i],
      plus:segments[mk] && segments[mk][i],
      meaningOnly:segments[audioRoles.meaningOnly] && segments[audioRoles.meaningOnly][i],
      word:words[i] && words[i].word || '',
      meaning:words[i] && words[i].meaning || ''
    }));
    renderList();
    updateListen();
    updateQuizStats();
    setReady(count ? count+'개 준비 완료' : '구간 없음');
  }
  function renderList(){
    if(!items.length){ els.resultList.innerHTML=''; return; }
    els.resultList.innerHTML = items.map((it,i)=>`<div class="item"><b>${i+1}</b><span>${it.word?escapeHtml(it.word):'<small>단어 '+(i+1)+'</small>'}</span><small>${it.meaning?escapeHtml(it.meaning):''}</small></div>`).join('');
  }
  function escapeHtml(s){ return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
  function formatSeg(it){ return ''; }

  function updateListen(){
    if(!items.length){
      els.listenCount.textContent = '0 / 0';
      els.listenTitle.textContent = '업로드';
      els.listenSub.textContent = '';
      return;
    }
    if(listenIndex < 0) listenIndex = 0;
    if(listenIndex >= items.length) listenIndex = items.length - 1;
    const it = items[listenIndex] || {};
    els.listenCount.textContent = (listenIndex + 1) + ' / ' + items.length;
    els.listenTitle.textContent = it.word || ('단어 ' + (listenIndex + 1));
    els.listenSub.textContent = it.meaning ? displayMeaning(it.meaning) : (it.meaningOnly ? '카드를 뒤집으면 뜻 음성이 재생됩니다' : '뜻 정보 없음');
    if(els.flashcard) els.flashcard.classList.remove('flipped');
    saveSessionState();
  }

  function getGapFor(i){
    if(!els.autoGap.checked) return parseInt(els.gapRange.value,10);
    const base = segments[audioRoles.meaning] || segments.plus || segments.two;
    const g = base && base[i] ? base[i].gapAfter*1000 : 1800;
    return Math.max(300, Math.min(4500, g));
  }
  function updateGapLabel(){
    els.gapRange.disabled = els.autoGap.checked;
    els.gapLabel.textContent = els.autoGap.checked ? '자동' : (Number(els.gapRange.value)/1000).toFixed(1)+'초';
  }
  function stopAudio(bump=true){
    if(bump) playToken++;
    if(currentSource){ try{currentSource.stop();}catch(e){} currentSource=null; }
  }
  async function playSegment(kind, index){
    ensureDerivedBuffers();
    kind = resolveAudioKind(kind);
    if((!segments[kind] || !segments[kind][index]) && kind !== audioRoles.meaningOnly) kind = audioRoles.meaningOnly;
    if((!segments[kind] || !segments[kind][index]) && kind !== audioRoles.wordOnly) kind = audioRoles.wordOnly;
    if((!segments[kind] || !segments[kind][index]) && kind !== audioRoles.meaning) kind = audioRoles.meaning;
    const seg = segments[kind] && segments[kind][index];
    const buf = audioBuffers[kind];
    if(!seg || !buf) return;
    stopAudio(false);
    const ctx = getAudioContext();
    if(ctx.state === 'suspended') await ctx.resume();
    const src = ctx.createBufferSource();
    src.buffer = buf;
    src.connect(ctx.destination);
    currentSource = src;
    const duration = Math.max(0.05, seg.end - seg.start);
    src.start(0, seg.start, duration);
    await new Promise(r=>{ src.onended = r; setTimeout(r, duration*1000+160); });
    if(currentSource === src) currentSource = null;
  }

  async function playAll(){
    if(!items.length) return;
    stopAudio(); const token=playToken; const kind=resolveAudioKind(els.studyAudio.value);
    const order=shuffle(items.map((_,i)=>i));
    for(const i of order){
      if(token!==playToken) break;
      listenIndex=i; updateListen();
      await playSegment(kind,i);
      if(token!==playToken) break;
      await sleep(getGapFor(i));
    }
  }

  function repeatCount(){
    const n = parseInt(els.repeatCount && els.repeatCount.value, 10);
    return Math.max(1, Math.min(10, Number.isFinite(n) ? n : 1));
  }
  function isFinalResultMode(){ return !els.resultTiming || els.resultTiming.value !== 'immediate'; }
  function shouldShowResults(){ return !!(quiz && (quiz.showResults || !isFinalResultMode())); }
  function currentIdx(){ return quiz && quiz.pos < quiz.order.length ? quiz.order[quiz.pos] : -1; }
  function canAdvanceCurrent(){ return !quiz || els.quizMode.value === 'audioOnly' || (quiz.currentHeard || 0) >= 1; }
  function targetFor(it, mode){
    if(!it) return '';
    if(mode === 'meaning') return displayMeaning(it.meaning || '') || (it.meaningOnly ? '뜻 음성' : '');
    if(mode === 'both') return [it.word, displayMeaning(it.meaning)].filter(Boolean).join(' / ');
    if(mode === 'either') return [it.word, displayMeaning(it.meaning)].filter(Boolean).join(' / ');
    return it.word || '';
  }
  function logIsWrong(r){ return !!(r && (r.manualWrong || (r.checked && !r.correct))); }
  function recalcScore(){
    if(!quiz) return {ok:0,no:0};
    const no = quiz.log.filter(logIsWrong).length;
    const ok = quiz.log.filter(r => r.checked && r.correct && !r.manualWrong).length;
    quiz.ok = ok; quiz.no = no;
    return {ok,no};
  }

  function updateQuizUi(){
    const audioOnly = els.quizMode.value === 'audioOnly';
    const mode = els.answerMode.value;
    els.answerGrid.classList.toggle('hidden', audioOnly);
    els.answerMode.disabled = audioOnly;
    els.submitAnswer.textContent = audioOnly ? '다음' : (isFinalResultMode() ? '다음' : '확인');
    els.answerGrid.classList.toggle('two', !audioOnly && mode === 'both');
    els.meaningInput.classList.toggle('hidden', mode !== 'both');
    if(mode === 'word') els.answerInput.placeholder = '단어 입력';
    if(mode === 'meaning') els.answerInput.placeholder = '뜻 입력';
    if(mode === 'either') els.answerInput.placeholder = '들리는 단어 또는 뜻 입력';
    if(mode === 'both') els.answerInput.placeholder = '단어 입력';
    if(els.pauseQuiz) els.pauseQuiz.innerHTML = quiz && quiz.paused ? (ICONS.play + '<span>다시 시작</span>') : (ICONS.pause + '<span>일시정지</span>');
    if(els.submitAnswer) els.submitAnswer.disabled = !!(quiz && !canAdvanceCurrent() && !audioOnly);
    if(els.skipAnswer) els.skipAnswer.disabled = !!(quiz && !canAdvanceCurrent() && !audioOnly);
  }

  function startQuiz(order){
    const baseOrder = Array.isArray(order) && order.length ? order.slice() : items.map((_,i)=>i);
    if(!items.length || !baseOrder.length) return;
    stopAudio();
    quiz = {
      order: shuffle(baseOrder), pos: 0, ok: 0, no: 0, log: [], nextLogId: 1,
      token: ++quizToken, paused: false, ended: false, showResults: false,
      currentHeard: 0, currentPlaying: false, resumeReplayTwice: false, currentPromptMode: 'word'
    };
    els.quizFeedback.textContent='';
    renderQuizLog();
    updateQuizStats();
    updateQuizUi();
    nextQuiz(true);
  }

  function nextQuiz(autoPlay){
    updateQuizUi();
    if(!quiz) return;
    if(quiz.pos>=quiz.order.length){
      els.quizTitle.textContent='완료';
      els.quizCount.textContent=quiz.order.length ? quiz.order.length+' / '+quiz.order.length : '0 / 0';
      els.answerInput.value=''; els.meaningInput.value='';
      if(els.quizMode.value === 'audioOnly' || !isFinalResultMode()) finishQuiz(false);
      else { updateQuizStats(); renderQuizLog(); }
      return;
    }
    quiz.currentHeard = 0;
    quiz.currentPlaying = false;
    quiz.token = ++quizToken;
    const idx = quiz.order[quiz.pos];
    const it = items[idx] || {};
    quiz.currentPromptMode = getPromptMode(idx);
    els.quizCount.textContent = (quiz.pos+1)+' / '+quiz.order.length;
    if(els.answerMode.value === 'either'){
      els.quizTitle.textContent = quiz.currentPromptMode === 'meaning' ? (displayMeaning(it.meaning) || '뜻 음성') : (it.word || ('단어 '+(idx+1))); 
    }else{
      els.quizTitle.textContent = '문제 '+(quiz.pos+1);
    }
    els.answerInput.value=''; els.meaningInput.value=''; els.quizFeedback.textContent='';
    updateQuizStats(); renderQuizLog(); updateQuizUi();
    if(els.quizMode.value !== 'audioOnly') setTimeout(()=>els.answerInput.focus(), 30);
    if(autoPlay) playCurrentQuestion();
  }

  async function playCurrentQuestion(repeatOverride){
    if(!quiz || quiz.pos>=quiz.order.length || quiz.ended) return;
    const q = quiz, token = q.token, idx = q.order[q.pos];
    const loops = Math.max(1, Math.min(10, repeatOverride || repeatCount()));
    q.currentPlaying = true;
    updateQuizUi();
    for(let r=0;r<loops;r++){
      if(quiz !== q || q.token !== token || q.paused || q.pos>=q.order.length || q.order[q.pos]!==idx) break;
      await playSegment(getQuizAudioKind(), idx);
      if(quiz !== q || q.token !== token || q.paused || q.pos>=q.order.length || q.order[q.pos]!==idx) break;
      q.currentHeard = Math.max(q.currentHeard || 0, r+1);
      updateQuizUi();
      if(r < loops-1) await sleep(getGapFor(idx));
    }
    if(quiz === q && q.token === token) q.currentPlaying = false;
    updateQuizUi();
    if(quiz === q && q.token === token && !q.paused && els.quizMode.value === 'audioOnly' && els.audioAutoNext.checked && q.pos<q.order.length && q.order[q.pos]===idx){
      addAudioLog();
      q.pos++;
      renderQuizLog(); updateQuizStats();
      await sleep(getGapFor(idx));
      if(quiz === q && q.token === token && !q.paused) nextQuiz(true);
    }
  }

  function addAudioLog(){
    if(!quiz || quiz.pos>=quiz.order.length) return;
    const seq = quiz.pos + 1;
    const idx = quiz.order[quiz.pos];
    if(quiz.log.some(r => r.seq === seq && r.idx === idx)) return;
    const it = items[idx] || {};
    quiz.log.push({id:quiz.nextLogId++, seq, idx, ans:'', word:targetFor(it,'both') || ('단어 '+(idx+1)), correct:true, checked:false, manualWrong:false});
  }

  async function submitAnswer(skip){
    if(!quiz || quiz.pos>=quiz.order.length || quiz.ended) return;
    if(els.quizMode.value === 'audioOnly'){
      if((quiz.currentHeard || 0) < 1 && !skip) return;
      quiz.token = ++quizToken;
      stopAudio();
      addAudioLog();
      const idx=quiz.order[quiz.pos];
      quiz.pos++;
      renderQuizLog(); updateQuizStats(); updateQuizUi();
      await sleep(180);
      nextQuiz(true);
      return;
    }
    if(!canAdvanceCurrent()) return;
    quiz.token = ++quizToken;
    stopAudio();
    const seq=quiz.pos+1;
    const idx=quiz.order[quiz.pos], it=items[idx] || {}, ans=els.answerInput.value.trim(), ans2=els.meaningInput.value.trim();
    const mode = els.answerMode.value;
    const promptMode = mode === 'either' ? (quiz.currentPromptMode || 'word') : mode;
    let correct = false, checked = true;
    if(skip){ correct=false; }
    else if(mode === 'word' || promptMode === 'word'){
      checked = !!it.word; correct = checked && norm(ans) === norm(it.word);
    }else if(mode === 'meaning' || promptMode === 'meaning'){
      checked = !!it.meaning; correct = checked && meaningMatches(ans, it.meaning);
    }else if(mode === 'both'){
      checked = !!(it.word && it.meaning);
      correct = checked && norm(ans) === norm(it.word) && meaningMatches(ans2, it.meaning);
    }
    const shownAnswer = mode === 'both' ? [ans, ans2].filter(Boolean).join(' / ') : ans;
    const target = mode === 'either' ? targetFor(it, promptMode) : targetFor(it, mode);
    quiz.log.push({id:quiz.nextLogId++, seq, idx, ans:shownAnswer, word:target, correct, checked, manualWrong:false});
    recalcScore();
    els.quizFeedback.textContent = !isFinalResultMode() && checked ? (correct ? '정답' : '정답: '+(target||'')) : '입력됨';
    quiz.pos++;
    renderQuizLog(); updateQuizStats(); updateQuizUi();
    await sleep(isFinalResultMode() ? 180 : 520);
    nextQuiz(true);
  }

  function finishQuiz(showMsg=true){
    if(!quiz) return;
    if(els.quizMode.value === 'audioOnly' && quiz.pos < quiz.order.length && (quiz.currentHeard||0) >= 1) addAudioLog();
    quiz.token = ++quizToken;
    stopAudio();
    quiz.ended = true;
    quiz.paused = false;
    quiz.showResults = true;
    recalcScore();
    els.quizTitle.textContent = quiz.pos >= quiz.order.length ? '완료' : '시험 종료';
    els.quizCount.textContent = quiz.log.length + ' / ' + quiz.order.length;
    els.quizFeedback.textContent = showMsg ? '답안지' : '';
    renderQuizLog(); updateQuizStats(); updateQuizUi();
  }

  function pauseQuiz(markReplay=false){
    if(!quiz || quiz.ended) return;
    if(quiz.paused){ if(markReplay) quiz.resumeReplayTwice = true; return; }
    quiz.paused = true;
    if(markReplay) quiz.resumeReplayTwice = true;
    quiz.token = ++quizToken;
    stopAudio();
    els.quizFeedback.textContent = '일시정지';
    updateQuizUi();
  }
  function resumeQuiz(){
    if(!quiz || quiz.ended || !quiz.paused) return;
    quiz.paused = false;
    quiz.token = ++quizToken;
    const repeat = quiz.resumeReplayTwice ? 2 : undefined;
    quiz.resumeReplayTwice = false;
    els.quizFeedback.textContent = '';
    updateQuizUi();
    if(quiz.pos < quiz.order.length) playCurrentQuestion(repeat);
  }
  function togglePauseQuiz(){
    if(!quiz) return;
    quiz.paused ? resumeQuiz() : pauseQuiz(false);
  }

  function updateQuizStats(){
    if(!quiz){
      els.scoreOk.textContent = 0; els.scoreNo.textContent = 0; els.scoreLeft.textContent = items.length; return;
    }
    const {ok,no} = recalcScore();
    const show = shouldShowResults();
    els.scoreOk.textContent = show ? ok : '-';
    els.scoreNo.textContent = show ? no : '-';
    els.scoreLeft.textContent = Math.max(0, quiz.order.length-quiz.pos);
    saveSessionState();
  }
  function renderQuizLog(){
    if(!quiz){ renderList(); return; }
    if(!shouldShowResults()){
      els.resultList.innerHTML = '';
      return;
    }
    if(!quiz.log.length){ els.resultList.innerHTML = '<div class="quiet">답안지가 비어 있습니다.</div>'; return; }
    els.resultList.innerHTML = quiz.log.slice().reverse().map(r=>{
      const cls = logIsWrong(r) ? 'no' : (r.checked ? 'ok' : '');
      const answer = r.ans ? escapeHtml(r.ans) : '듣기 완료';
      const target = r.word ? escapeHtml(r.word) : '정답 없음';
      const checked = r.manualWrong ? 'checked' : '';
      return `<div class="historyItem resultRow" data-log="${r.id}"><b>문제 ${r.seq||''}</b><span>${answer}</span><small class="${cls}">${target}</small><button class="btn playMini" type="button" data-replay="${r.idx}" aria-label="다시 듣기">${ICONS.play}</button><label class="wrongMark"><input class="wrongCheck" type="checkbox" data-log="${r.id}" ${checked}>틀림</label></div>`;
    }).join('');
  }
  function collectWrongIndexes(){
    if(!quiz) return [];
    const out=[];
    for(const r of quiz.log){ if(logIsWrong(r) && !out.includes(r.idx)) out.push(r.idx); }
    return out;
  }
  function retryWrongQuiz(){
    const wrong = collectWrongIndexes();
    if(!wrong.length){ els.quizFeedback.textContent = '틀린 문제가 없습니다'; return; }
    startQuiz(wrong);
  }
  function replayQuizIndex(idx){
    if(!Number.isFinite(idx)) return;
    const cur = currentIdx();
    if(quiz && !quiz.ended && els.quizMode.value === 'audioOnly' && idx !== cur && !quiz.paused) pauseQuiz(true);
    stopAudio();
    playSegment(getQuizAudioKind(), idx);
  }


  function openDB(){
    return new Promise((resolve,reject)=>{
      const req = indexedDB.open(DB_NAME, 1);
      req.onupgradeneeded = () => req.result.createObjectStore(DB_STORE);
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error || new Error('저장소를 열 수 없습니다.'));
    });
  }
  async function idbSet(key, value){
    const db = await openDB();
    return new Promise((resolve,reject)=>{
      const tx = db.transaction(DB_STORE, 'readwrite');
      tx.objectStore(DB_STORE).put(value, key);
      tx.oncomplete = () => { db.close(); resolve(); };
      tx.onerror = () => { db.close(); reject(tx.error); };
    });
  }
  async function idbGet(key){
    const db = await openDB();
    return new Promise((resolve,reject)=>{
      const tx = db.transaction(DB_STORE, 'readonly');
      const req = tx.objectStore(DB_STORE).get(key);
      req.onsuccess = () => resolve(req.result || null);
      req.onerror = () => reject(req.error);
      tx.oncomplete = () => db.close();
    });
  }
  async function saveRawAudioSession(sig){
    if(!sig) return;
    const list = [];
    for(const k of ['wordOnly','meaningOnly','meaning','two','plus']){
      const r = rawAudio[k];
      if(r && r.buffer) list.push({kind:k, name:r.name||'', buffer:r.buffer});
    }
    if(list.length) await idbSet('raw:'+sig, list);
  }
  async function loadRawAudioSession(sig){
    const list = await idbGet('raw:'+sig);
    if(!Array.isArray(list) || !list.length) return false;
    rawAudio = {auto:[]};
    for(const r of list) if(r && r.kind && r.buffer) rawAudio[r.kind] = {name:r.name||r.kind, buffer:r.buffer};
    return true;
  }
  function activeSceneId(){
    const sc = document.querySelector('.scene.on');
    return sc ? sc.id : 'setup';
  }
  function setScene(id){
    document.querySelectorAll('[data-scene]').forEach(b=>b.classList.toggle('on', b.dataset.scene===id));
    document.querySelectorAll('.scene').forEach(s=>s.classList.toggle('on', s.id===id));
  }
  function cleanQuizForSave(q){
    if(!q) return null;
    return {
      order:q.order||[], pos:q.pos||0, ok:q.ok||0, no:q.no||0, log:q.log||[], nextLogId:q.nextLogId||1,
      ended:!!q.ended, showResults:!!q.showResults, paused:!!q.paused,
      currentHeard:q.currentHeard||0, resumeReplayTwice:false, currentPromptMode:q.currentPromptMode||'word'
    };
  }
  function saveSessionState(){
    try{
      if(!items.length && !quiz) return;
      const sig = currentSig || fileSignature(String(els.dayInput.value||'').trim());
      const data = {
        v:14, sig, savedAt:Date.now(), day:String(els.dayInput.value||'').trim(), preset:els.cutPreset.value,
        settings: (typeof getSettingsSnapshot === 'function' ? getSettingsSnapshot() : null),
        segments, fineSegments, audioRoles, words, listenIndex, quiz:cleanQuizForSave(quiz), scene:activeSceneId()
      };
      localStorage.setItem(SESSION_KEY, JSON.stringify(data));
    }catch(e){}
  }
  async function restoreSessionOnLoad(){
    try{
      showSkeleton('진행상황 불러오는 중','새로고침 전 상태를 복원하고 있습니다.');
      const raw = localStorage.getItem(SESSION_KEY);
      if(!raw) return;
      const data = JSON.parse(raw);
      if(!data || data.v !== 14 || !data.sig) return;
      currentSig = data.sig;
      if(data.day) els.dayInput.value = data.day;
      if(data.preset) els.cutPreset.value = data.preset;
      if(data.settings){
        for(const id of Object.keys(data.settings)) writeControlValue(document.getElementById(id), data.settings[id]);
      }
      updateGapLabel();
      segments = data.segments || {};
      fineSegments = data.fineSegments || {};
      audioRoles = data.audioRoles || audioRoles;
      words = data.words || [];
      const hasRaw = await loadRawAudioSession(data.sig);
      if(!hasRaw) return;
      const rawKinds = ['wordOnly','meaningOnly','two','plus','meaning'].filter(k=>rawAudio[k]);
      setStatus('진행상황 불러오는 중');
      setReady('복원 중');
      for(const k of rawKinds) await decodeOnly(k);
      ensureDerivedBuffers();
      buildItems();
      listenIndex = Math.max(0, Math.min(data.listenIndex||0, Math.max(0, items.length-1)));
      updateListen();
      if(data.quiz){
        quiz = data.quiz;
        quiz.token = ++quizToken;
        quiz.currentPlaying = false;
        if(!quiz.ended) quiz.paused = true;
        renderQuizLog(); updateQuizStats(); updateQuizUi();
      }
      if(words.length) els.wordText.value = words.map(x=>x.word+(x.meaning?'\t'+x.meaning:'')).join('\n');
      setScene(data.scene || (quiz ? 'quiz' : 'listen'));
      els.fileName.textContent = '진행상황 복원됨';
      setReady(items.length ? items.length+'개 복원됨' : '복원 완료');
      setStatus('진행상황을 불러왔습니다.');
    }catch(e){ console.warn(e); }
    finally{ hideSkeleton(); }
  }
  function fileSignature(day){
    return JSON.stringify({v:14, day:String(day||''), preset:els.cutPreset.value, files:selectedFiles.map(f=>({name:f.name,size:f.size,lastModified:f.lastModified||0})).sort((a,b)=>a.name.localeCompare(b.name))});
  }
  function loadAnalysisCache(sig){
    try{
      const raw = localStorage.getItem(CACHE_KEY);
      if(!raw) return null;
      const data = JSON.parse(raw);
      if(data && data.sig === sig && data.segments) return data;
    }catch(e){}
    return null;
  }
  function saveAnalysisCache(sig){
    try{
      const data = {sig, savedAt:Date.now(), segments, fineSegments, audioRoles, words};
      localStorage.setItem(CACHE_KEY, JSON.stringify(data));
    }catch(e){}
  }
  async function decodeOnly(kind){
    if(!rawAudio[kind] || audioBuffers[kind]) return;
    const ctx = getAudioContext();
    audioBuffers[kind] = await decodeAudioRobust(rawAudio[kind].buffer);
  }

  async function analyze(){
    if(!selectedFiles.length){ setStatus('파일을 선택하세요.'); return; }
    resetProgress(); stopAudio(); setReady('분석 중');
    audioBuffers={}; segments={}; fineSegments={}; items=[]; quiz=null; quizToken++; listenIndex=0; renderList(); updateListen(); updateQuizStats();
    els.analyzeBtn.disabled=true;
    try{
      const day = String(els.dayInput.value || '').trim();
      const sig = fileSignature(day);
      await loadFromSelection(selectedFiles, day);
      const rawKinds = ['wordOnly','meaningOnly','two','plus','meaning'].filter(k=>rawAudio[k]);
      if(!rawKinds.length) throw new Error('해당 Day 회차 mp3를 찾지 못했습니다.');
      currentSig = sig;
      await saveRawAudioSession(sig);
      setProgress('decode',0.05,'오디오 준비 중');
      const seenBuffers = new Set();
      for(const k of rawKinds){
        const b = rawAudio[k] && rawAudio[k].buffer;
        if(b && seenBuffers.has(b)) continue;
        if(b) seenBuffers.add(b);
        await decodeOne(k);
      }
      if(!segments.wordOnly && !segments.two) setProgress('two',1);
      if(!segments.meaning && !segments.plus) setProgress('plus',1);
      setProgress('decode',1,'분석 완료');
      if(!words.length) words = parseWords(els.wordText.value);
      buildItems();
      await recognizeContents();
      buildItems();
      // 분석 캐시는 사용하지 않고, 새로고침 복원용 진행상황만 저장합니다.
      setStatus('분석 완료');
      saveSessionState();
    }catch(err){ setStatus(String(err.message||err)); setReady('오류'); }
    finally{ els.analyzeBtn.disabled=false; }
  }

  document.querySelectorAll('.tab').forEach(btn=>btn.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
    document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));
    btn.classList.add('on'); $('#'+btn.dataset.tab).classList.add('on');
  }));
  els.zipInput.addEventListener('change', e=>{
    selectedFiles=[...e.target.files];
    els.fileName.textContent = selectedFiles.length===1 ? selectedFiles[0].name : selectedFiles.length+'개 파일 선택됨';
  });
  els.analyzeBtn.addEventListener('click', analyze);
  els.autoGap.addEventListener('change', updateGapLabel);
  els.gapRange.addEventListener('input', updateGapLabel);
  if(els.applyWords) els.applyWords.addEventListener('click',()=>{ applySettingsFromControls(true); });
  if(els.flashcard) els.flashcard.addEventListener('click',()=>{
    els.flashcard.classList.toggle('flipped');
    const it = items[listenIndex] || {};
    if(els.flashcard.classList.contains('flipped') && !it.meaning && it.meaningOnly){ stopAudio(); playSegment('meaningOnly', listenIndex); }
  });
  els.playOne.addEventListener('click',()=>{ stopAudio(); playSegment(resolveAudioKind(els.studyAudio.value), listenIndex); });
  els.playAll.addEventListener('click',playAll);
  els.stopListen.addEventListener('click',stopAudio);
  els.prevBtn.addEventListener('click',()=>{ if(items.length){listenIndex=(listenIndex-1+items.length)%items.length; updateListen();} });
  els.nextBtn.addEventListener('click',()=>{ if(items.length){listenIndex=(listenIndex+1)%items.length; updateListen();} });
  els.shuffleBtn.addEventListener('click',()=>{ if(items.length){listenIndex=Math.floor(Math.random()*items.length); updateListen();} });
  els.startQuiz.addEventListener('click',()=>startQuiz());
  if(els.pauseQuiz) els.pauseQuiz.addEventListener('click',togglePauseQuiz);
  els.stopQuiz.addEventListener('click',()=>finishQuiz(true));
  if(els.finalSubmit) els.finalSubmit.addEventListener('click',()=>finishQuiz(true));
  if(els.retryWrong) els.retryWrong.addEventListener('click',retryWrongQuiz);
  els.quizPlay.addEventListener('click',()=>{
    if(quiz && quiz.pos<quiz.order.length){
      if(quiz.paused) resumeQuiz();
      quiz.token = ++quizToken;
      stopAudio();
      playSegment(getQuizAudioKind(), quiz.order[quiz.pos]);
    }
  });
  els.submitAnswer.addEventListener('click',()=>submitAnswer(false));
  els.skipAnswer.addEventListener('click',()=>submitAnswer(true));
  let lastWordSpaceAt = 0;
  function handleWordDoubleSpace(e){
    if(e.key !== ' ' || els.answerMode.value !== 'both' || els.meaningInput.classList.contains('hidden')){
      if(e.key !== ' ') lastWordSpaceAt = 0;
      return false;
    }
    const now = performance.now();
    if(now - lastWordSpaceAt <= 360){
      e.preventDefault();
      const input = els.answerInput;
      const start = input.selectionStart ?? input.value.length;
      const end = input.selectionEnd ?? input.value.length;
      const val = input.value;
      if(start > 0 && val[start-1] === ' '){
        input.value = val.slice(0,start-1) + val.slice(end);
        const pos = start - 1;
        input.setSelectionRange(pos,pos);
      }
      lastWordSpaceAt = 0;
      els.meaningInput.focus();
      return true;
    }
    lastWordSpaceAt = now;
    return false;
  }
  els.answerInput.addEventListener('keydown',e=>{ if(handleWordDoubleSpace(e)) return; if(e.key==='Enter') submitAnswer(false); });
  els.meaningInput.addEventListener('keydown',e=>{ if(e.key==='Enter') submitAnswer(false); });
  els.resultList.addEventListener('click', e=>{
    const btn = e.target.closest('[data-replay]');
    if(btn){ replayQuizIndex(Number(btn.dataset.replay)); return; }
  });
  els.resultList.addEventListener('change', e=>{
    const cb = e.target.closest('.wrongCheck');
    if(!cb || !quiz) return;
    const id = Number(cb.dataset.log);
    const row = quiz.log.find(r=>r.id===id);
    if(row){ row.manualWrong = cb.checked; recalcScore(); renderQuizLog(); updateQuizStats(); }
  });
  function settingsIsOpen(){ return document.body.classList.contains('settingsOpen'); }
  els.quizMode.addEventListener('change',()=>{ if(!settingsIsOpen()) updateQuizUi(); });
  els.answerMode.addEventListener('change',()=>{ if(!settingsIsOpen()) updateQuizUi(); });
  if(els.resultTiming) els.resultTiming.addEventListener('change',()=>{ if(!settingsIsOpen()){ renderQuizLog(); updateQuizStats(); updateQuizUi(); } });
  if(els.audioAutoNext) els.audioAutoNext.addEventListener('change',()=>{ if(!settingsIsOpen()) updateQuizUi(); });
  if(els.repeatCount) els.repeatCount.addEventListener('change',()=>{ els.repeatCount.value = Math.max(1, Math.min(10, parseInt(els.repeatCount.value,10)||1)); });

  const SETTINGS_IDS = ['studyAudio','testAudio','quizMode','answerMode','resultTiming','repeatCount','audioAutoNext','autoGap','gapRange','asrEnabled','wordText'];
  let settingsSnapshot = null;
  function readControlValue(el){ return el && el.type === 'checkbox' ? !!el.checked : (el ? el.value : ''); }
  function writeControlValue(el, value){
    if(!el) return;
    if(el.type === 'checkbox') el.checked = !!value;
    else el.value = value == null ? '' : value;
  }
  function getSettingsSnapshot(){
    const out = {};
    for(const id of SETTINGS_IDS){ const el = document.getElementById(id); out[id] = readControlValue(el); }
    return out;
  }
  function restoreSettingsSnapshot(snap){
    if(!snap) return;
    for(const id of SETTINGS_IDS){ writeControlValue(document.getElementById(id), snap[id]); }
    updateGapLabel();
    renderQuizLog();
    updateQuizStats();
    updateQuizUi();
  }
  function closeSettingsRaw(){ document.body.classList.remove('settingsOpen'); }
  function openSettings(){ settingsSnapshot = getSettingsSnapshot(); document.body.classList.add('settingsOpen'); updateGapLabel(); }
  function cancelSettings(){ restoreSettingsSnapshot(settingsSnapshot); closeSettingsRaw(); }
  async function applySettingsFromControls(keepOpen=false){
    showSkeleton('변경사항 불러오는 중','설정을 반영하고 있습니다.');
    await new Promise(r=>requestAnimationFrame(()=>requestAnimationFrame(r)));
    try{
    if(els.repeatCount) els.repeatCount.value = Math.max(1, Math.min(10, parseInt(els.repeatCount.value,10)||1));
    updateGapLabel();
    const parsed = parseWords(els.wordText.value);
    words = parsed;
    if(items.length || segments[audioRoles.wordOnly] || segments[audioRoles.meaning]) buildItems();
    renderQuizLog();
    updateQuizStats();
    updateQuizUi();
    try{ saveSessionState(); }catch(e){}
    settingsSnapshot = getSettingsSnapshot();
    setStatus('설정 적용 완료');
    if(!keepOpen) closeSettingsRaw();
    } finally { setTimeout(hideSkeleton, 120); }
  }
  const openSettingsBtn = document.getElementById('openSettings');
  const closeSettingsBtn = document.getElementById('closeSettings');
  const settingsOverlay = document.getElementById('settingsOverlay');
  if(openSettingsBtn) openSettingsBtn.addEventListener('click', openSettings);
  if(closeSettingsBtn) closeSettingsBtn.addEventListener('click', cancelSettings);
  if(els.cancelSettings) els.cancelSettings.addEventListener('click', cancelSettings);
  if(els.applySettings) els.applySettings.addEventListener('click',()=>applySettingsFromControls(false));
  if(settingsOverlay) settingsOverlay.addEventListener('click', e=>{ if(e.target===settingsOverlay) cancelSettings(); });
  document.querySelectorAll('[data-scene]').forEach(btn=>btn.addEventListener('click',()=>{
    const scene = btn.dataset.scene;
    document.querySelectorAll('[data-scene]').forEach(b=>b.classList.toggle('on', b===btn));
    document.querySelectorAll('.scene').forEach(s=>s.classList.toggle('on', s.id===scene));
  }));
  initIcons();
  window.addEventListener('beforeunload', saveSessionState);
  updateGapLabel(); updateQuizUi();
  restoreSessionOnLoad();
})();
</script>
</body>
